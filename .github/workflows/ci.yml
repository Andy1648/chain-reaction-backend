# CI: install -> lint -> test on every push and PR.
# No build/typecheck steps: this is a plain-CommonJS Node server with no
# build artifact, and tsc --checkJs was evaluated and rejected (too noisy
# on an untyped codebase). Prettier is opt-in per file, so no format gate.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
